<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Social Links</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="profile">
            <img src="techtrix.png" alt="Profile" class="profile-img" id="profileImg">
            <h1>Connect With Me</h1>
            <p>Scan the QR code or click the links below</p>
        </div>
        
        <div class="qr-section">
            <div id="qrcode"></div>
            <p class="qr-note">Scan to view all my social links</p>
        </div>

        <div class="social-links">
            <a href="YOUR_INSTAGRAM_URL" class="social-link instagram" target="_blank">
                <span>Instagram</span>
            </a>
            <a href="YOUR_LINKEDIN_URL" class="social-link linkedin" target="_blank">
                <span>LinkedIn</span>
            </a>
            <a href="YOUR_FACEBOOK_URL" class="social-link facebook" target="_blank">
                <span>Facebook</span>
            </a>
            <a href="YOUR_X_URL" class="social-link x" target="_blank">
                <span>X (Twitter)</span>
            </a>
            <a href="YOUR_TIKTOK_URL" class="social-link tiktok" target="_blank">
                <span>TikTok</span>
            </a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
